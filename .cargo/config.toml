[env]
GTK_PATH = { value = "/usr/lib/x86_64-linux-gnu/gtk-3.0", force = true }
GTK_EXE_PREFIX = { value = "/usr", force = true }
GTK_DATA_PREFIX = { value = "/usr", force = true }
GTK_MODULES = { value = "", force = true }
GTK3_MODULES = { value = "", force = true }

# Android build configuration
[target.aarch64-linux-android]
linker = "aarch64-linux-android34-clang"
ar = "aarch64-linux-android-ar"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=--sysroot=/home/gc/Android/Sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/linux-x86_64/sysroot",
]

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi34-clang"
ar = "arm-linux-androideabi-ar"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=--sysroot=/home/gc/Android/Sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/linux-x86_64/sysroot",
]

[target.x86_64-linux-android]
linker = "x86_64-linux-android34-clang"
ar = "x86_64-linux-android-ar"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=--sysroot=/home/gc/Android/Sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/linux-x86_64/sysroot",
]
